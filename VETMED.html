<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VETMED</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Josefin+Slab:wght@700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:background .4s; }
  body.dark  { background: radial-gradient(ellipse at 30% 20%, #13312B 0%, #0D1F1C 60%, #08130F 100%); }
  body.light { background: radial-gradient(ellipse at 30% 20%, #E4F2EC 0%, #EFF6F2 60%, #F4F9F6 100%); }
  #root { display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-family:'Plus Jakarta Sans',sans-serif; }

  @keyframes slideInRight { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes slideInLeft  { from{transform:translateX(-30%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes fadeUp       { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes popIn        { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes successPop   { 0%{transform:scale(0) rotate(-15deg);opacity:0} 60%{transform:scale(1.2) rotate(4deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
  @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(130px) rotate(360deg);opacity:0} }
  @keyframes ringPulse    { 0%{transform:scale(0.8);opacity:0.7} 100%{transform:scale(2.4);opacity:0} }
  @keyframes slideUpFade  { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes notifSlide   { from{transform:translateX(14px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes shimmer      { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .enter-right { animation: slideInRight 0.32s cubic-bezier(0.22,1,0.36,1) forwards; }
  .enter-left  { animation: slideInLeft  0.32s cubic-bezier(0.22,1,0.36,1) forwards; }
  input,textarea { outline:none; border:none; background:transparent; font-family:'Plus Jakarta Sans',sans-serif; }
  button { cursor:pointer; border:none; background:none; font-family:'Plus Jakarta Sans',sans-serif; }
  a { text-decoration:none; }
  ::-webkit-scrollbar { display:none; }
  .tap:active { opacity:.7; transform:scale(.97); }
  .card-tap:active { transform:scale(.97); }
</style>
</head>
<body class="light">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, createContext, useContext } = React;

/* ════════════════════════════════════════
   THEME SYSTEM
════════════════════════════════════════ */
const DARK = {
  mode: 'dark',
  bg:       '#0D1F1C', surface:  '#122A26', card:     '#163029', elevated: '#1C3A32',
  mint:     '#6FCFB0', mintDim:  '#4FAE91', mintGlow: 'rgba(111,207,176,0.15)',
  onMint:   '#0D1F1C',
  white:    '#FFFFFF', offWhite: '#EAF6F1', muted:    'rgba(234,246,241,0.48)',
  faint:    'rgba(234,246,241,0.09)', border: 'rgba(111,207,176,0.22)',
  text:     '#EAF6F1', textSub:  'rgba(234,246,241,0.55)',
  inputBg:  'rgba(234,246,241,0.06)', danger: '#FF7B7B', dangerBg: 'rgba(255,123,123,0.12)',
  overlay:  'rgba(0,0,0,0.45)', heroScrim: 'rgba(13,31,28,0.55)', heroBorder: 'rgba(111,207,176,0.45)',
  cardShadow: '0 8px 24px rgba(0,0,0,0.32)', navShadow: '0 -8px 32px rgba(0,0,0,0.42)',
  vWizyta:'#6FCFB0', vSzczep:'#F2C14E', vZabieg:'#F08DAE', vDiag:'#6FA8E0',
  vWizytaBg:'rgba(111,207,176,0.14)', vSzczepBg:'rgba(242,193,78,0.14)', vZabiegBg:'rgba(240,141,174,0.14)', vDiagBg:'rgba(111,168,224,0.14)',
  warnBg:'rgba(242,193,78,0.12)', warnBorder:'rgba(242,193,78,0.3)',
  okBg:'rgba(111,207,176,0.10)', okBorder:'rgba(111,207,176,0.24)',
  confetti: ['#6FCFB0','#F2C14E','#F08DAE','#C4F5E1','#A8EDDC'],
};
const LIGHT = {
  mode: 'light',
  bg:       '#F1F7F4', surface:  '#FFFFFF', card:     '#FFFFFF', elevated: '#E8F2ED',
  mint:     '#1F7A63', mintDim:  '#155E4B', mintGlow: 'rgba(31,122,99,0.10)',
  onMint:   '#FFFFFF',
  white:    '#FFFFFF', offWhite: '#0F2722', muted:    'rgba(15,39,34,0.50)',
  faint:    'rgba(15,39,34,0.055)', border: 'rgba(31,122,99,0.16)',
  text:     '#0F2722', textSub:  'rgba(15,39,34,0.55)',
  inputBg:  'rgba(15,39,34,0.045)', danger: '#C0392B', dangerBg: 'rgba(192,57,43,0.10)',
  overlay:  'rgba(15,39,34,0.40)', heroScrim: 'rgba(13,31,28,0.55)', heroBorder: 'rgba(255,255,255,0.5)',
  cardShadow: '0 2px 8px rgba(20,60,50,0.06), 0 10px 26px rgba(20,60,50,0.05)', navShadow: '0 -4px 22px rgba(20,60,50,0.10)',
  vWizyta:'#1F7A63', vSzczep:'#B07A12', vZabieg:'#C24B73', vDiag:'#2E6FB0',
  vWizytaBg:'rgba(31,122,99,0.10)', vSzczepBg:'rgba(176,122,18,0.10)', vZabiegBg:'rgba(194,75,115,0.10)', vDiagBg:'rgba(46,111,176,0.10)',
  warnBg:'rgba(176,122,18,0.08)', warnBorder:'rgba(176,122,18,0.22)',
  okBg:'rgba(31,122,99,0.07)', okBorder:'rgba(31,122,99,0.18)',
  confetti: ['#1F7A63','#E0A92E','#E0739B','#7FD9C0','#3E8FD0'],
};

const VISIT_COLOR = {
  'Badanie ogólne':   { c:'vWizyta', bg:'vWizytaBg' },
  'Kontrola':         { c:'vWizyta', bg:'vWizytaBg' },
  'Pierwsza wizyta':  { c:'vWizyta', bg:'vWizytaBg' },
  'Szczepienie':      { c:'vSzczep', bg:'vSzczepBg' },
  'Odrobaczanie':     { c:'vZabieg', bg:'vZabiegBg' },
  'Zabieg':           { c:'vZabieg', bg:'vZabiegBg' },
  'USG brzucha':      { c:'vDiag',   bg:'vDiagBg' },
};
const visitColor = (type, t) => {
  const m = VISIT_COLOR[type] || { c:'vWizyta', bg:'vWizytaBg' };
  return { color: t[m.c], bg: t[m.bg] };
};

const RAD = { icon:12, chip:10, card:16, hero:20 };

const ThemeCtx = createContext(DARK);
const useT = () => useContext(ThemeCtx);

/* ════════════════════════════════════════
   ICONS
════════════════════════════════════════ */
function IcHome({a,t})  { return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><polyline points="9 21 9 13 15 13 15 21"/></svg>; }
function IcSearch({a,t}){ return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>; }
function IcPlus({a,t})  { return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>; }
function IcUser({a,t})  { return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>; }
function IcBack({t})    { return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={t.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>; }
function IcCamera({t})  { return <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>; }
function IcBell({a,t})  { return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>; }
function IcDoc({t})     { return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>; }
function IcDown({t})    { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>; }
function IcChev({t})    { return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={t.muted} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>; }
function IcSettings({a,t}){ return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>; }
function IcPhone({t})   { return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>; }
function IcMap({t})     { return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>; }
function IcSun({t})     { return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>; }
function IcMoon({t})    { return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>; }

/* ════════════════════════════════════════
   LOGO SVG
════════════════════════════════════════ */
function VetLogo({ size = 34 }) {
  const t = useT();
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      {/* Shield */}
      <path d="M20 3L4 10v11c0 9 7 14 16 15 9-1 16-6 16-15V10L20 3Z"
        fill={t.mint} opacity="0.18" stroke={t.mint} strokeWidth="1.5"/>
      {/* Cross */}
      <rect x="17.5" y="12" width="5" height="16" rx="2.5" fill={t.mint}/>
      <rect x="12" y="17.5" width="16" height="5" rx="2.5" fill={t.mint}/>
    </svg>
  );
}

/* ════════════════════════════════════════
   STATUS BAR
════════════════════════════════════════ */
function StatusBar() {
  const t = useT();
  return (
    <div style={{ height:44, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 22px', flexShrink:0 }}>
      <span style={{ fontSize:13, fontWeight:700, color:t.text, letterSpacing:0.3 }}>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="15" height="11" viewBox="0 0 15 11" fill={t.text}><rect x="0" y="3" width="2.5" height="8" rx="1"/><rect x="4" y="2" width="2.5" height="9" rx="1"/><rect x="8" y="0" width="2.5" height="11" rx="1"/><rect x="12" y="1" width="2.5" height="10" rx="1" opacity="0.3"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke={t.text} strokeOpacity="0.3"/><rect x="1.5" y="1.5" width="18" height="10" rx="2.5" fill={t.text}/><path d="M24 4.5V8.5C25 8 25.5 7 25.5 6.5S25 5 24 4.5Z" fill={t.text} fillOpacity="0.4"/></svg>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════ */
function IcPaw({a,t}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill={a?t.mint:t.muted}><ellipse cx="12" cy="17.5" rx="5" ry="3.8"/><ellipse cx="6.2" cy="13.5" rx="2.4" ry="3.2"/><ellipse cx="17.8" cy="13.5" rx="2.4" ry="3.2"/><ellipse cx="9" cy="8.2" rx="1.9" ry="2.9"/><ellipse cx="15" cy="8.2" rx="1.9" ry="2.9"/></svg>;
}
function IcCalendar({a,t}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
}
function IcHistory({a,t}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><polyline points="12 7 12 12 16 14"/></svg>;
}
function IcGrid({a,t}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>;
}
function IcMore({a,t}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?t.mint:t.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>;
}
function IcCreditCard({t}) {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.mint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>;
}
function IcLogout({t}) {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.danger} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
}

function BottomNav({ active, navigate, notifCount = 0, onLogout }) {
  const t = useT();
  const [showMore, setShowMore] = useState(false);

  const tabs = [
    { id:'home',               label:'Dom',      Ic: IcHome },
    { id:'rejestracja_wizyta', label:'Umów',     Ic: IcCalendar },
    { id:'zwierzeta',          label:'Zwierzaki',Ic: IcPaw },
    { id:'historia',           label:'Wizyty',   Ic: IcHistory },
    { id:'more',               label:'Więcej',   Ic: IcMore },
  ];

  const moreItems = [
    { icon: <IcCreditCard t={t}/>, label:'Płatności',        sub:'Historia i metody płatności', action:()=>{ setShowMore(false); } },
    { icon: <IcBell a={1} t={t}/>, label:'Powiadomienia',    sub:'Alerty i przypomnienia',       action:()=>{ setShowMore(false); navigate('powiadomienia'); },
      badge: notifCount > 0 ? notifCount : null },
    { icon: <IcSettings a={1} t={t}/>, label:'Ustawienia',   sub:'Motyw, język, hasło',          action:()=>{ setShowMore(false); navigate('ustawienia'); } },
    { icon: <IcLogout t={t}/>,     label:'Wyloguj się',      sub:'Zakończ sesję',                action:()=>{ setShowMore(false); onLogout && onLogout(); }, danger:true },
  ];

  return (
    <>
      {/* More popup overlay */}
      {showMore && (
        <div onClick={() => setShowMore(false)}
          style={{ position:'absolute', inset:0, zIndex:25, background:t.overlay, backdropFilter:'blur(4px)', borderRadius:10 }}>
          <div onClick={e => e.stopPropagation()}
            style={{ position:'absolute', bottom:88, left:8, right:8, borderRadius:RAD.hero,
              background:t.surface, border:`1px solid ${t.border}`,
              boxShadow:t.navShadow, overflow:'hidden',
              animation:'slideUpFade .22s cubic-bezier(0.22,1,0.36,1) both' }}>
            {/* Handle */}
            <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 4px' }}>
              <div style={{ width:36, height:4, borderRadius:2, background:t.faint }} />
            </div>
            <div style={{ padding:'4px 0 8px' }}>
              {moreItems.map((item, i) => (
                <button key={i} className="tap" onClick={item.action}
                  style={{ width:'100%', display:'flex', alignItems:'center', gap:14, padding:'13px 20px',
                    borderBottom: i<moreItems.length-1 ? `1px solid ${t.faint}` : 'none',
                    background:'transparent', textAlign:'left' }}>
                  <div style={{ width:38, height:38, borderRadius:RAD.icon,
                    background: item.danger ? t.dangerBg : t.mintGlow,
                    display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, position:'relative' }}>
                    {item.icon}
                    {item.badge && (
                      <div style={{ position:'absolute', top:-3, right:-3, minWidth:16, height:16, padding:'0 3px', borderRadius:8,
                        background:t.danger, display:'flex', alignItems:'center', justifyContent:'center',
                        border:`2px solid ${t.surface}` }}>

function petAge(born) {
  const d = new Date(born), now = new Date();
  const y = now.getFullYear()-d.getFullYear(), m = now.getMonth()-d.getMonth();
  const months = y*12+(m<0?m+12:m);
  return months < 12 ? `${months} mies.` : `${Math.floor(months/12)} ${Math.floor(months/12)===1?'rok':Math.floor(months/12)<5?'lata':'lat'}`;
}

function MiniCalendar({ selected, onSelect }) {
  const t = useT();
  const [month, setMonth] = useState(3);
  const year = 2026;
  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay+6)%7;
  const dim = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0; i<offset; i++) cells.push(null);
  for(let d=1; d<=dim; d++) cells.push(d);
  while(cells.length%7) cells.push(null);
  const today = 25;
  const isPast = d => d && month===3 && d<today;
  const isSel  = d => d && selected?.month===month && selected?.day===d;
  return (
    <div style={{ background:t.card, borderRadius:16, overflow:'hidden', border:`1px solid ${t.border}` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 16px', borderBottom:`1px solid ${t.faint}` }}>
        <button onClick={() => setMonth(m=>Math.max(3,m-1))} style={{ color:t.mint, fontSize:20, width:28 }}>‹</button>
        <span style={{ color:t.text, fontWeight:700, fontSize:13 }}>{MONTHS_PL[month]} {year}</span>
        <button onClick={() => setMonth(m=>Math.min(11,m+1))} style={{ color:t.mint, fontSize:20, width:28 }}>›</button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'8px 8px 0' }}>
        {WDAYS.map(d => <div key={d} style={{ textAlign:'center', fontSize:10, color:t.muted, fontWeight:700, padding:'4px 0' }}>{d}</div>)}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'4px 8px 10px', gap:2 }}>
        {cells.map((d,i) => (
          <button key={i} onClick={() => d && !isPast(d) && onSelect({month,day:d})}
            style={{ aspectRatio:'1', borderRadius:'50%', fontSize:12, fontWeight:isSel(d)?700:400,
              background: isSel(d) ? t.mint : 'transparent',
              color: isSel(d) ? (t.onMint) : isPast(d) ? t.faint : t.text,
              cursor: d && !isPast(d) ? 'pointer' : 'default',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow: isSel(d) ? `0 3px 10px ${t.mintGlow}` : 'none', transition:'all .15s' }}>
            {d||''}
          </button>
        ))}
      </div>
    </div>
  );
}

function PowiadomieniaScreen({ navigate }) {
  const t = useT();
  const [dismissed, setDismissed] = useState(new Set());
  const visible = NOTIFS_DATA.filter(n => !dismissed.has(n.id));
  const groups = [
    { key:'today', label:'Dziś',       items: visible.filter(n=>n.grp==='today') },
    { key:'week',  label:'Ten tydzień', items: visible.filter(n=>n.grp==='week') },
    { key:'older', label:'Starsze',    items: visible.filter(n=>n.grp==='older') },
  ].filter(g => g.items.length > 0);

  const NC = { warning:t.warnBg, info:t.mintGlow, success:t.okBg };
  const BC = { warning:t.warnBorder, info:t.border, success:t.okBorder };
  const NCC = { warning:t.vSzczep, info:t.mint, success:t.vWizyta };

  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <StatusBar />
      <div style={{ display:'flex', alignItems:'center', padding:'4px 16px 14px', gap:12 }}>
        <button className="tap" onClick={() => navigate('home')}
          style={{ width:36, height:36, borderRadius:RAD.icon, background:t.faint, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IcBack t={t} />
        </button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:22, fontWeight:800, color:t.text }}>Powiadomienia</div>
          <div style={{ fontSize:11, color:t.muted }}>{visible.length} aktywnych</div>
        </div>
        {visible.length > 0 && (
          <button className="tap" onClick={() => setDismissed(new Set(NOTIFS_DATA.map(n=>n.id)))}
            style={{ fontSize:11, color:t.mint, fontWeight:700, padding:'5px 10px', border:`1px solid ${t.border}`, borderRadius:RAD.chip }}>
            Wyczyść
          </button>
        )}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'0 16px', paddingBottom:40 }}>
        {visible.length === 0 && (
          <div style={{ textAlign:'center', padding:'60px 0' }}>
            <div style={{ fontSize:48, marginBottom:16 }}>🎉</div>
            <div style={{ color:t.text, fontSize:15, fontWeight:700, marginBottom:6 }}>Wszystko pod kontrolą!</div>
            <div style={{ color:t.muted, fontSize:13 }}>Brak nowych powiadomień</div>
          </div>
        )}
        {groups.map(g => (
          <div key={g.key} style={{ marginBottom:20 }}>
            <SectionLabel>{g.label}</SectionLabel>
            {g.items.map((n, i) => (
              <div key={n.id} style={{ marginBottom:10, borderRadius:RAD.card, padding:'13px 14px',
                background:NC[n.type], border:`1px solid ${BC[n.type]}`, borderLeft:`3px solid ${NCC[n.type]}`,
                animation:`notifSlide .3s ${i*.05}s both` }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
                  <div style={{ width:34, height:34, borderRadius:RAD.icon, background:t.card, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0, boxShadow:t.cardShadow }}>{n.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:t.text, marginBottom:2 }}>{n.title}</div>
                    <div style={{ fontSize:12, color:t.muted, lineHeight:1.5 }}>{n.desc}</div>
                    <div style={{ marginTop:8, display:'flex', gap:8 }}>
                      <span style={{ fontSize:10, color:t.mint, background:t.mintGlow, borderRadius:RAD.chip, padding:'2px 8px', fontWeight:700 }}>{n.pet}</span>
                    </div>
                    {/* Inline actions for appointment notifs */}
                    {(n.type==='warning'||n.type==='info') && (
                      <div style={{ display:'flex', gap:8, marginTop:10 }}>
                        <button className="tap" onClick={() => navigate('przychodnia')}
                          style={{ flex:1, padding:'7px', borderRadius:RAD.chip, background:t.mintGlow, border:`1px solid ${t.border}`,
                            color:t.mint, fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', gap:4 }}>
                          <IcPhone t={t} /> Zadzwoń
                        </button>
                        <button className="tap" onClick={() => navigate('rejestracja_wizyta')}
                          style={{ flex:1, padding:'7px', borderRadius:RAD.chip, background:t.faint, border:`1px solid ${t.border}`,
                            color:t.text, fontSize:11, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', gap:4 }}>
                          📅 Zmień termin
                        </button>
                      </div>
                    )}
                  </div>
                  <button onClick={() => setDismissed(p=>new Set([...p,n.id]))}
                    style={{ color:t.muted, fontSize:18, lineHeight:1, flexShrink:0 }}>×</button>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   HISTORIA LECZENIA
════════════════════════════════════════ */
function HistoriaScreen({ navigate }) {
  const t = useT();
  const [filterPet, setFilterPet] = useState('Wszystkie');
  const pets = ['Wszystkie',...[...new Set(HISTORIA_DAT.map(h=>h.pet))]];
  const filtered = HISTORIA_DAT.filter(h => filterPet==='Wszystkie' || h.pet===filterPet);

  const showToast = doc => {
    const el = document.createElement('div');
    el.textContent = `📄 Pobieranie: ${doc}`;
    Object.assign(el.style, { position:'fixed', bottom:'100px', left:'50%', transform:'translateX(-50%)',
      background:t.card, color:t.mint, padding:'10px 20px', borderRadius:'12px', fontSize:'13px',
      fontWeight:'700', border:`1px solid ${t.border}`, zIndex:9999,
      fontFamily:'Plus Jakarta Sans', boxShadow:t.cardShadow,
      animation:'slideUpFade 0.3s both', whiteSpace:'nowrap' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  };

  return (
    <div style={{ width:'100%', height:'100%', background:t.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <StatusBar />
      <BackHeader onBack={() => navigate('home')} title="Historia leczenia"
        subtitle={`${HISTORIA_DAT.length} wpisów · ${HISTORIA_DAT.filter(h=>h.doc).length} PDF`} />

      <div style={{ display:'flex', gap:8, padding:'0 16px 12px', overflowX:'auto' }}>
        {pets.map(p => (
          <button key={p} className="tap" onClick={() => setFilterPet(p)}
            style={{ padding:'6px 14px', borderRadius:20, fontSize:12, fontWeight:700, flexShrink:0,
              background: filterPet===p ? t.mint : t.faint,
              color: filterPet===p ? (t.onMint) : t.muted,
              border: filterPet===p ? 'none' : `1px solid ${t.border}`,
              transition:'all .15s' }}>
            {p}
          </button>
        ))}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'0 16px', paddingBottom:40 }}>
        <div style={{ position:'relative' }}>
          <div style={{ position:'absolute', left:20, top:0, bottom:0, width:2,
            background:`linear-gradient(180deg, ${t.mint} 0%, transparent 100%)`, opacity:0.3 }} />
          {filtered.map((h, i) => {
            const vc = visitColor(h.type, t);
            return (
            <div key={h.id} style={{ display:'flex', gap:14, marginBottom:12, animation:`slideUpFade .4s ${i*.06}s both` }}>
              <div style={{ flexShrink:0, width:42, display:'flex', justifyContent:'center', paddingTop:14 }}>
                <div style={{ width:14, height:14, borderRadius:'50%', background:vc.color, border:`2px solid ${t.bg}`, zIndex:1, boxShadow:`0 0 0 3px ${vc.bg}` }} />
              </div>
              <div style={{ flex:1, background:t.card, borderRadius:RAD.card, padding:'13px', border:`1px solid ${t.border}`, boxShadow:t.cardShadow, borderLeft:`3px solid ${vc.color}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:t.text }}>{h.emoji} {h.type}</span>
                  <span style={{ fontSize:11, color:t.muted, fontWeight:700 }}>{h.date}</span>
                </div>
                <div style={{ display:'flex', gap:6, marginBottom:h.doc?10:0, flexWrap:'wrap' }}>
                  <span style={{ fontSize:10, color:vc.color, background:vc.bg, borderRadius:RAD.chip, padding:'2px 8px', fontWeight:700 }}>{h.type}</span>
                  <span style={{ fontSize:10, color:t.mint, background:t.mintGlow, borderRadius:RAD.chip, padding:'2px 8px', fontWeight:700 }}>{h.pet}</span>
                  <span style={{ fontSize:10, color:t.muted, background:t.faint, borderRadius:RAD.chip, padding:'2px 8px' }}>{h.doctor}</span>
                </div>
                {h.doc && (
                  <button className="tap" onClick={() => showToast(h.doc)}
                    style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 12px', borderRadius:RAD.chip,
                      background:t.faint, border:`1px solid ${t.border}`, width:'100%', justifyContent:'space-between' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <IcDoc t={t} />
                      <span style={{ fontSize:11, color:t.text, fontWeight:600 }}>{h.doc}</span>
                    </div>
                    <IcDown t={t} />
                  </button>
                )}
              </div>
            </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   APP ROOT
════════════════════════════════════════ */
function App() {
  const [darkMode, setDarkMode] = useState(() => (localStorage.getItem('vm_theme') ?? 'light') === 'dark');
  const t = darkMode ? DARK : LIGHT;

  const [screen, setScreen] = useState(() => localStorage.getItem('vm_screen') || 'login');
  const [pet, setPet] = useState(null);
  const [pets, setPets] = useState(INIT_PETS);
  const [dir, setDir] = useState('right');
  const [animKey, setAnimKey] = useState(0);

  useEffect(() => {
    document.body.className = darkMode ? 'dark' : 'light';
    localStorage.setItem('vm_theme', darkMode ? 'dark' : 'light');
  }, [darkMode]);

  const BACK_SCREENS = new Set(['login','rejestracja_konto']);
  const TAB_SCREENS = new Set(['home','szukaj','zwierzeta','historia','profil']);

  const navigate = (to, petData) => {
    const goBack = BACK_SCREENS.has(to) || (TAB_SCREENS.has(to) && !BACK_SCREENS.has(screen));
    setDir(goBack ? 'left' : 'right');
    if(petData) setPet(petData);
    setScreen(to);
    setAnimKey(k=>k+1);
    localStorage.setItem('vm_screen', to);
  };

  const onLogout = () => { setScreen('login'); setAnimKey(k=>k+1); localStorage.removeItem('vm_screen'); };

  const screenMap = {
    login:               <LoginScreen navigate={navigate} />,
    rejestracja_konto:   <RejestracjaKontoScreen navigate={navigate} />,
    home:                <HomeScreen navigate={navigate} pets={pets} onLogout={onLogout} />,
    szukaj:              <SzukajScreen navigate={navigate} pets={pets} onLogout={onLogout} />,
    zwierzeta:           <ZwierzętaScreen navigate={navigate} pets={pets} onLogout={onLogout} />,
    profil:              <ProfilScreen navigate={navigate} pets={pets} onLogout={onLogout} />,
    ustawienia:          <UstawieniaScreen navigate={navigate} darkMode={darkMode} setDarkMode={m => { setDarkMode(m); }} />,
    karta:               <KartaScreen navigate={navigate} pet={pet} onLogout={onLogout} />,
    dodaj:               <DodajScreen navigate={navigate} onAddPet={p => setPets(prev=>[...prev,p])} />,
    rejestracja_wizyta:  <RejestracjaWizytaScreen navigate={navigate} pet={pet} />,
    powiadomienia:       <PowiadomieniaScreen navigate={navigate} />,
    historia:            <HistoriaScreen navigate={navigate} />,
    przychodnia:         <PrzychowniaScreen navigate={navigate} />,
  };

  return (
    <ThemeCtx.Provider value={t}>
      <div style={{ width:'100%', height:'100%', overflow:'hidden', position:'relative',
        background:t.bg, transition:'background .4s' }}>
        <div key={animKey} className={dir==='left'?'enter-left':'enter-right'} style={{ width:'100%', height:'100%' }}>
          {screenMap[screen] || screenMap.login}
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
